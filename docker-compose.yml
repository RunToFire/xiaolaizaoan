name: hyperf-wechat

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: hyperf_app
    restart: unless-stopped
    working_dir: /opt/www
    command: ["php", "bin/hyperf.php", "start"]
    environment:
      APP_NAME: ${APP_NAME:-hyperf-wechat}
      APP_ENV: ${APP_ENV:-prod}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_HOST: ${APP_HOST:-0.0.0.0}
      APP_PORT: ${APP_PORT:-9501}
      DB_DRIVER: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-wechat}
      DB_USERNAME: ${DB_USERNAME:-hyperf}
      DB_PASSWORD: ${DB_PASSWORD:-change_me}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: ${REDIS_DB:-0}
      WECHAT_OFFICIAL_ACCOUNT_APPID: ${WECHAT_OFFICIAL_ACCOUNT_APPID:-}
      WECHAT_OFFICIAL_ACCOUNT_SECRET: ${WECHAT_OFFICIAL_ACCOUNT_SECRET:-}
      WECHAT_OFFICIAL_ACCOUNT_TOKEN: ${WECHAT_OFFICIAL_ACCOUNT_TOKEN:-}
      WECHAT_OFFICIAL_ACCOUNT_AES_KEY: ${WECHAT_OFFICIAL_ACCOUNT_AES_KEY:-}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
    volumes:
      - ./app:/opt/www
    expose:
      - "9501"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php -r '$$s=@fsockopen(\"127.0.0.1\", (int)getenv(\"APP_PORT\") ?: 9501); exit($$s ? 0 : 1);'"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 20s
    networks:
      - webnet

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    container_name: hyperf_nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./app:/opt/www:ro
    depends_on:
      app:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/nginx-health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6
    networks:
      - webnet

  mysql:
    image: mysql:8.4
    container_name: hyperf_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-change_root_me}
      MYSQL_DATABASE: ${DB_DATABASE:-wechat}
      MYSQL_USER: ${DB_USERNAME:-hyperf}
      MYSQL_PASSWORD: ${DB_PASSWORD:-change_me}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - webnet

  redis:
    image: redis:7.4-alpine
    container_name: hyperf_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 6
    networks:
      - webnet

networks:
  webnet:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
